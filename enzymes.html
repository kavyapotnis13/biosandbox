<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enzymes — BioSandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-module="enzymes">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header class="site-nav">
    <a href="index.html" class="brand">
      <span class="brand-icon" aria-hidden="true">🧬</span>
      BioSandbox
    </a>
    <div class="track-toggle" role="group" aria-label="Audience level">
      <button class="track-option" data-track="middle" type="button">Middle</button>
      <button class="track-option" data-track="high" type="button">High</button>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link nav-link-icon" aria-label="Home" title="Home"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12 L12 3 L22 12 L20 12 L20 21 L4 21 L4 12 Z" fill="#F07C99" stroke="#2D2154" stroke-width="1.8" stroke-linejoin="round"/><rect x="10" y="14" width="4" height="7" fill="#2D2154" rx="0.5"/></svg></a>
    </div>
  </header>

  <nav class="breadcrumb"><a href="index.html">Home</a> / Enzymes</nav>

  <main id="main">
    <div class="enzymes-layout">

      <!-- Left pane: enzyme sim -->
      <div class="enzyme-pane">

        <!-- Enzyme picker -->
        <div class="enzyme-picker" id="enzyme-picker" role="tablist" aria-label="Pick an enzyme"></div>

        <!-- The enzyme + substrate animation -->
        <div class="enzyme-stage">
          <svg id="enzyme-svg" class="enzyme-svg cycle-run" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" aria-label="Enzyme + substrate animation">
            <!-- Enzyme body (active shape) -->
            <path class="enz-body active" d="
              M 50 170
              Q 30 170 30 150
              L 30 80
              Q 30 56 60 56
              L 110 56
              Q 122 56 128 70
              L 140 96
              Q 154 116 168 96
              L 180 70
              Q 186 56 200 56
              L 250 56
              Q 280 56 280 80
              L 280 150
              Q 280 170 260 170
              Z" />
            <!-- Enzyme body (denatured shape) -->
            <path class="enz-body denat" d="
              M 50 170
              Q 22 168 32 142
              Q 50 116 36 92
              Q 24 64 60 62
              Q 100 60 120 84
              Q 150 110 180 84
              Q 210 58 252 62
              Q 296 64 280 96
              Q 264 124 280 152
              Q 290 174 260 170
              Z" />

            <!-- Substrate -->
            <g class="substrate">
              <path d="M -14 -10 L 14 -10 L 14 0 Q 8 4 4 12 Q 0 18 -4 12 Q -8 4 -14 0 Z"
                    fill="var(--theme-accent)" stroke="#2D2154" stroke-width="1.8"/>
              <text x="0" y="3" font-family="serif" font-size="9" font-style="italic" font-weight="700" fill="#2D2154" text-anchor="middle">S</text>
            </g>

            <!-- Two products that fan out after the reaction -->
            <g class="products">
              <circle class="prod prod-1" cx="0" cy="0" r="7" fill="var(--theme-accent)" stroke="#2D2154" stroke-width="1.6"/>
              <circle class="prod prod-2" cx="0" cy="0" r="7" fill="var(--theme-accent)" stroke="#2D2154" stroke-width="1.6"/>
            </g>

            <!-- Active-site label -->
            <text x="154" y="48" class="enzyme-label" text-anchor="middle">active site</text>
            <text x="154" y="142" class="enzyme-label" text-anchor="middle">enzyme</text>
          </svg>
        </div>

        <p class="enzyme-status" id="enzyme-status">Running at 100% of max rate.</p>

        <!-- Reaction summary line -->
        <div class="reaction-summary" aria-live="polite">
          <span class="rxn-name" id="enzyme-name">Amylase</span>
          <span class="rxn-where">(<span id="enzyme-where">Saliva</span>)</span>
          <span class="rxn-line">
            <span id="substrate-label">Starch</span>
            <span class="rxn-arrow">→</span>
            <span id="product-label">Maltose</span>
          </span>
        </div>

        <!-- Sliders -->
        <div class="enzyme-controls">
          <label class="enzyme-control">
            <span class="control-label">Temperature</span>
            <input id="temp-slider" type="range" min="0" max="100" step="1" value="37" aria-label="Temperature in degrees Celsius">
            <span class="control-readout" id="temp-readout">37°C</span>
          </label>
          <label class="enzyme-control">
            <span class="control-label">pH</span>
            <input id="ph-slider" type="range" min="1" max="14" step="0.1" value="7" aria-label="pH">
            <span class="control-readout" id="ph-readout">7.0</span>
          </label>
        </div>

        <!-- Stats row -->
        <div class="enzyme-stats">
          <div class="enzyme-stat">
            <span class="enzyme-stat-label">Activity</span>
            <span class="enzyme-stat-value" id="rate-readout">100%</span>
          </div>
          <div class="enzyme-stat">
            <span class="enzyme-stat-label">Reactions / sec</span>
            <span class="enzyme-stat-value" id="rps-readout">0.00</span>
          </div>
          <div class="enzyme-stat">
            <span class="enzyme-stat-label">Products made</span>
            <span class="enzyme-stat-value" id="products-readout">0</span>
          </div>
          <button class="link-button reset-conditions" id="reset-conditions" type="button">↻ Reset</button>
        </div>

        <!-- Activity curve charts -->
        <div class="activity-charts">
          <figure class="activity-chart">
            <figcaption class="chart-label">Activity vs temperature</figcaption>
            <svg id="temp-chart" viewBox="0 0 280 84" width="100%" height="84" aria-hidden="true"></svg>
          </figure>
          <figure class="activity-chart">
            <figcaption class="chart-label">Activity vs pH</figcaption>
            <svg id="ph-chart" viewBox="0 0 280 84" width="100%" height="84" aria-hidden="true"></svg>
          </figure>
        </div>

      </div>

      <!-- Right pane: flashcard decks -->
      <aside class="info-pane">
        <div class="info-panel flashcard-panel">
          <div class="flashcard-deck" id="flashcard-deck" aria-live="polite">
            <div class="flashcard-section-label" id="section-label">Catalysts of life</div>
            <div class="flashcard flashcard-enter">
              <h2 class="flashcard-title"></h2>
              <div class="flashcard-body"></div>
            </div>
            <div class="flashcard-nav">
              <button class="flashcard-btn" id="card-prev" type="button" aria-label="Previous card">←</button>
              <span class="flashcard-counter" id="card-counter">1 / 3</span>
              <button class="flashcard-btn" id="card-next" type="button" aria-label="Next card">→</button>
            </div>
          </div>

          <button class="link-button" id="section-back" type="button" hidden>← Back to the basics</button>
        </div>
      </aside>

    </div>

    <div class="cell-footer-bar">
      <span class="explored-pill">Ready to test what you've learned?</span>
      <a href="quiz.html?module=enzymes" class="cta-button">Take the quiz →</a>
    </div>
  </main>

  <footer class="site-footer">Built for Congressional App Challenge 2026 &middot; <a href="about.html" class="footer-link">About</a></footer>

  <script src="data/modules.js"></script>
  <script src="data/ap-standards.js"></script>
  <script src="data/enzymes-content.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/enzymes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
