  <main id="main">
    <div class="mitosis-layout">

      <div class="scene-pane">
        <svg viewBox="0 0 600 640" class="mitosis-svg"
             xmlns="http://www.w3.org/2000/svg"
             role="img"
             aria-label="Mitosis diagram showing chromosome condensation, alignment, separation, and cell division.">

          <!-- Cell membrane: a single circle during phases 0-3, replaced by
               two daughter circles during cytokinesis (phase 4). -->
          <circle class="cell-membrane" cx="300" cy="320" r="240"/>

          <g class="daughter-cells" aria-hidden="true">
            <circle class="daughter-cell daughter-left"  cx="160" cy="320" r="135"/>
            <circle class="daughter-cell daughter-right" cx="440" cy="320" r="135"/>
          </g>

          <!-- Cleavage furrow: small inward wedges pinching the cell at the
               equator during cytokinesis. -->
          <g class="cleavage-furrow" aria-hidden="true">
            <path d="M 300 80  L 290 110 L 310 110 Z"/>
            <path d="M 300 560 L 290 530 L 310 530 Z"/>
          </g>

          <!-- Parent nucleus: visible during interphase and the start of
               prophase; fades out as the envelope breaks down. -->
          <circle class="nucleus" cx="300" cy="320" r="150"/>

          <!-- Daughter nuclei: appear at the poles in telophase + cytokinesis. -->
          <g class="daughter-nuclei" aria-hidden="true">
            <circle class="daughter-nucleus" cx="160" cy="320" r="60"/>
            <circle class="daughter-nucleus" cx="440" cy="320" r="60"/>
          </g>

          <!-- Centrosomes at each pole. Appear in prophase. -->
          <g class="centrosome centrosome-left">
            <circle cx="90" cy="320" r="10"/>
            <circle cx="90" cy="320" r="4" class="centrosome-dot"/>
            <text class="centrosome-label" x="90" y="295">centrosome</text>
          </g>
          <g class="centrosome centrosome-right">
            <circle cx="510" cy="320" r="10"/>
            <circle cx="510" cy="320" r="4" class="centrosome-dot"/>
          </g>

          <!-- Spindle fibers: lines from each centrosome to each chromosome.
               Visible from metaphase onward; fade out in telophase. -->
          <g class="spindle">
            <line class="fiber" x1="90"  y1="320" x2="300" y2="200"/>
            <line class="fiber" x1="90"  y1="320" x2="300" y2="280"/>
            <line class="fiber" x1="90"  y1="320" x2="300" y2="360"/>
            <line class="fiber" x1="90"  y1="320" x2="300" y2="440"/>
            <line class="fiber" x1="510" y1="320" x2="300" y2="200"/>
            <line class="fiber" x1="510" y1="320" x2="300" y2="280"/>
            <line class="fiber" x1="510" y1="320" x2="300" y2="360"/>
            <line class="fiber" x1="510" y1="320" x2="300" y2="440"/>
          </g>

          <!-- Four chromosomes. Each is two sister chromatids joined at a
               centromere. The group's position is set per phase via CSS.
               At anaphase each chromatid translates toward its pole. -->
          <g class="chromosome chr-1">
            <rect class="chromatid chromatid-l" x="-8" y="-20" width="6" height="40" rx="3"/>
            <rect class="chromatid chromatid-r" x="2"  y="-20" width="6" height="40" rx="3"/>
            <circle class="centromere" cx="0" cy="0" r="3"/>
          </g>
          <g class="chromosome chr-2">
            <rect class="chromatid chromatid-l" x="-8" y="-20" width="6" height="40" rx="3"/>
            <rect class="chromatid chromatid-r" x="2"  y="-20" width="6" height="40" rx="3"/>
            <circle class="centromere" cx="0" cy="0" r="3"/>
          </g>
          <g class="chromosome chr-3">
            <rect class="chromatid chromatid-l" x="-8" y="-20" width="6" height="40" rx="3"/>
            <rect class="chromatid chromatid-r" x="2"  y="-20" width="6" height="40" rx="3"/>
            <circle class="centromere" cx="0" cy="0" r="3"/>
          </g>
          <g class="chromosome chr-4">
            <rect class="chromatid chromatid-l" x="-8" y="-20" width="6" height="40" rx="3"/>
            <rect class="chromatid chromatid-r" x="2"  y="-20" width="6" height="40" rx="3"/>
            <circle class="centromere" cx="0" cy="0" r="3"/>
          </g>

          <!-- Phase label, updated by JS. -->
          <text class="phase-label" id="mitosis-phase-label" x="300" y="610">Interphase</text>
        </svg>
