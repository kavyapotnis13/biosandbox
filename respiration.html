<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cellular Respiration — BioSandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body data-module="respiration">
  <a href="#main" class="skip-link">Skip to main content</a>
  <header class="site-nav">
    <a href="index.html" class="brand">
      <span class="brand-icon" aria-hidden="true">🧬</span>
      BioSandbox
    </a>
    <div class="track-toggle" role="group" aria-label="Audience level">
      <button class="track-option" data-track="middle" type="button">Middle</button>
      <button class="track-option" data-track="high" type="button">High</button>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link nav-link-icon" aria-label="Home" title="Home"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12 L12 3 L22 12 L20 12 L20 21 L4 21 L4 12 Z" fill="#F07C99" stroke="#2D2154" stroke-width="1.8" stroke-linejoin="round"/><rect x="10" y="14" width="4" height="7" fill="#2D2154" rx="0.5"/></svg></a>
    </div>
  </header>

  <nav class="breadcrumb"><a href="index.html">Home</a> / Cellular Respiration</nav>

  <main id="main">
    <div class="resp-layout">

      <div class="scene-pane">
        <svg viewBox="0 0 600 640" class="resp-svg"
             xmlns="http://www.w3.org/2000/svg"
             role="img"
             aria-label="Cellular respiration diagram: a cell with a mitochondrion, showing glycolysis in the cytoplasm and the Krebs cycle plus electron transport chain inside the mitochondrion.">

          <!-- Cell membrane (cytoplasm fill). -->
          <rect class="resp-cell" x="30" y="60" width="540" height="540" rx="70"/>
          <text class="resp-label" x="65" y="95">Cell (cytoplasm)</text>

          <!-- Mitochondrion: outer membrane + inner membrane + cristae folds. -->
          <g class="mito">
            <ellipse class="mito-outer" cx="300" cy="400" rx="220" ry="140"/>
            <ellipse class="mito-inner" cx="300" cy="400" rx="205" ry="125"/>
            <g class="cristae" aria-hidden="true">
              <path d="M 130 380 Q 165 400 130 420"/>
              <path d="M 195 340 Q 225 375 195 410"/>
              <path d="M 305 335 Q 335 375 305 415"/>
              <path d="M 405 340 Q 435 375 405 410"/>
              <path d="M 470 380 Q 435 400 470 420"/>
            </g>
            <text class="resp-label" x="300" y="290">Mitochondrion</text>
          </g>

          <!-- ============================================================
               GLYCOLYSIS — visible during the glycolysis deck (.scene-gly)
               ============================================================ -->
          <g class="gly-stage">
            <text class="stage-label" x="100" y="175">Glycolysis</text>

            <!-- One glucose at top, splits into two pyruvate. -->
            <g class="molecule gly-glucose">
              <polygon points="0,-20 18,-10 18,10 0,20 -18,10 -18,-10" class="mol-body glucose"/>
              <text class="mol-label" x="0" y="3">glucose</text>
            </g>
            <g class="molecule gly-pyr-1">
              <circle cx="0" cy="0" r="16" class="mol-body pyruvate"/>
              <text class="mol-label" x="0" y="3">pyruvate</text>
            </g>
            <g class="molecule gly-pyr-2">
              <circle cx="0" cy="0" r="16" class="mol-body pyruvate"/>
              <text class="mol-label" x="0" y="3">pyruvate</text>
            </g>
            <!-- Yields: 2 ATP, 2 NADH. -->
            <g class="molecule gly-atp">
              <rect x="-20" y="-13" width="40" height="26" rx="6" class="mol-body atp"/>
              <text class="mol-label" x="0" y="3">2 ATP</text>
            </g>
            <g class="molecule gly-nadh">
              <rect x="-26" y="-13" width="52" height="26" rx="6" class="mol-body nadh"/>
              <text class="mol-label" x="0" y="3">2 NADH</text>
            </g>
          </g>

          <!-- ============================================================
               KREBS CYCLE — visible during the Krebs deck (.scene-krebs)
               ============================================================ -->
          <g class="krebs-stage">
            <!-- Pyruvate / acetyl-CoA arriving into the matrix. -->
            <g class="molecule krebs-acetyl">
              <circle cx="0" cy="0" r="14" class="mol-body acetyl"/>
              <text class="mol-label" x="0" y="3">acetyl</text>
            </g>

            <!-- The cycle itself. -->
            <g class="krebs-cycle">
              <circle cx="300" cy="420" r="44" class="cycle-ring"/>
              <text class="cycle-center" x="300" y="416">Krebs</text>
              <text class="cycle-center" x="300" y="430">cycle</text>
            </g>

            <!-- CO₂ escaping from the matrix. -->
            <g class="molecule krebs-co2-1">
              <circle cx="0" cy="0" r="14" class="mol-body co2"/>
              <text class="mol-label" x="0" y="3">CO₂</text>
            </g>
            <g class="molecule krebs-co2-2">
              <circle cx="0" cy="0" r="14" class="mol-body co2"/>
              <text class="mol-label" x="0" y="3">CO₂</text>
            </g>

            <!-- NADH + FADH₂ output piles for the cycle. -->
            <g class="molecule krebs-nadh">
              <rect x="-26" y="-13" width="52" height="26" rx="6" class="mol-body nadh"/>
              <text class="mol-label" x="0" y="3">6 NADH</text>
            </g>
            <g class="molecule krebs-fadh">
              <rect x="-26" y="-13" width="52" height="26" rx="6" class="mol-body fadh"/>
              <text class="mol-label" x="0" y="3">2 FADH₂</text>
            </g>
          </g>

          <!-- ============================================================
               ELECTRON TRANSPORT CHAIN — visible during the ETC deck (.scene-etc)
               ============================================================ -->
          <g class="etc-stage">
            <text class="stage-label" x="300" y="305">Electron transport chain</text>

            <!-- Inner-membrane proteins: simple bumps along the bottom edge of
                 the inner membrane representing complexes I-IV. -->
            <g class="etc-complexes">
              <rect x="155" y="495" width="32" height="22" rx="4"/>
              <rect x="215" y="495" width="32" height="22" rx="4"/>
              <rect x="275" y="495" width="32" height="22" rx="4"/>
              <rect x="335" y="495" width="32" height="22" rx="4"/>
            </g>

            <!-- ATP synthase: a turbine at the right end of the chain. -->
            <g class="atp-synthase">
              <rect x="395" y="485" width="42" height="36" rx="5" class="synthase-top"/>
              <circle cx="416" cy="528" r="14" class="synthase-rotor"/>
              <text class="enzyme-label" x="416" y="478">ATP synthase</text>
            </g>

            <!-- H+ ions pumping ACROSS the inner membrane (arrows pointing up). -->
            <g class="etc-h-arrows">
              <path d="M 171 495 L 171 470 M 168 475 L 171 470 L 174 475" class="h-arrow"/>
              <path d="M 231 495 L 231 470 M 228 475 L 231 470 L 234 475" class="h-arrow"/>
              <path d="M 291 495 L 291 470 M 288 475 L 291 470 L 294 475" class="h-arrow"/>
              <path d="M 351 495 L 351 470 M 348 475 L 351 470 L 354 475" class="h-arrow"/>
              <!-- And one going back DOWN through ATP synthase. -->
              <path d="M 416 470 L 416 500 M 413 495 L 416 500 L 419 495" class="h-arrow h-arrow-down"/>
            </g>

            <!-- Pile of ATP produced. -->
            <g class="molecule etc-atp">
              <rect x="-32" y="-13" width="64" height="26" rx="6" class="mol-body atp"/>
              <text class="mol-label" x="0" y="3">~28 ATP</text>
            </g>

            <!-- Oxygen + H₂O label at the end of the chain. -->
            <g class="etc-water">
              <text class="reaction-label" x="500" y="510">O₂ + H⁺</text>
              <text class="reaction-label" x="500" y="528">→ H₂O</text>
            </g>
          </g>

          <!-- Phase label, updated by JS. -->
          <text class="phase-label" id="resp-phase-label" x="300" y="625">Overview</text>
        </svg>
      </div>

      <aside class="info-pane">
        <div class="info-panel flashcard-panel">
          <div class="flashcard-deck" id="flashcard-deck" aria-live="polite">
            <div class="flashcard-section-label" id="section-label">Respiration basics</div>
            <div class="flashcard flashcard-enter">
              <h2 class="flashcard-title"></h2>
              <div class="flashcard-body"></div>
            </div>
            <div class="flashcard-nav">
              <button class="flashcard-btn" id="card-prev" type="button" aria-label="Previous card">←</button>
              <span class="flashcard-counter" id="card-counter">1 / 5</span>
              <button class="flashcard-btn" id="card-next" type="button" aria-label="Next card">→</button>
            </div>
          </div>

          <button class="cta-button" id="section-cta" type="button" hidden>↻ Restart</button>
          <button class="link-button" id="section-back" type="button" hidden>← Back to the basics</button>
        </div>
      </aside>

    </div>

    <div class="cell-footer-bar">
      <span class="explored-pill">Ready to test what you've learned?</span>
      <a href="quiz.html?module=respiration" class="cta-button">Take the quiz →</a>
    </div>
  </main>
